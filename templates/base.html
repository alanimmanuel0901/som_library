<!DOCTYPE html>
<html>
<head>
    <title>SCHOOL OF MINES DIGITAL LIBRARY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;

            /* Dark marble texture */
            background: url('https://www.transparenttextures.com/patterns/marble.png'),
                        linear-gradient(135deg, #0f0f0f, #1c1c1c);
        }

        /* Gold Particles */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveParticles 60s linear infinite;
            z-index: -1;
        }

        @keyframes moveParticles {
            from { transform: translate(0,0); }
            to { transform: translate(200px,200px); }
        }

        nav {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.4);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            animation: crestGlow 3s ease-in-out infinite alternate;
        }

        @keyframes crestGlow {
            from { filter: drop-shadow(0 0 5px gold); }
            to { filter: drop-shadow(0 0 25px orange); }
        }

        nav h2 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 700;
            position: relative;
            color: gold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Moving Shine */
        nav h2::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent 0%,
                rgba(255,255,255,0.6) 50%,
                transparent 100%
            );
            animation: shine 5s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -6px;
            background: gold;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: gold;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 80px auto;
            position: relative;
        }

        /* Watermark Seal */
        .container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: url("{{ url_for('static', filename='logo.png') }}") no-repeat center;
            background-size: contain;
            opacity: 0.05;
            pointer-events: none;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.7);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        button {
            padding: 12px 26px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, gold, orange);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.07);
        }

        input {
            padding: 12px;
            border-radius: 12px;
            border: none;
            width: 100%;
            margin-bottom: 15px;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 100px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,215,0,0.4);
            font-size: 14px;
            color: #ddd;
        }

        footer span {
            color: gold;
            font-weight: bold;
        }

        @media(max-width:768px) {
            nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            nav h2 {
                font-size: 26px;
            }

            .logo {
                width: 50px;
                height: 50px;
            }

            .container::before {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="logo-container">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h2>SCHOOL OF MINES LIBRARY</h2>
    </div>

    <div>
        <a href="/">Home</a>
        <a href="/admin">Admin</a>
        <a href="/admin/history">History</a>
        <a href="/admin/reminders">Reminders</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    © 2026 <span>SCHOOL OF MINES DIGITAL LIBRARY</span><br>
    Official Academic Knowledge Portal
</footer>

</body>
</html>
