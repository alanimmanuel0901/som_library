<!DOCTYPE html>
<html>
<head>
<title>Borrow History</title>
<style>
body{
font-family:Arial;
background:linear-gradient(120deg,#e3f2fd,#ffffff);
padding:40px;
}
.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
h1{color:#0d47a1;}
</style>
</head>
<body>

<h1>📊 Borrow History – SCHOOL OF MINES</h1>

{% for b in borrows %}
<div class="card">
<b>Email:</b> {{ b.student_email }} <br>
<b>Book:</b> {{ b.book.title }} <br>
<b>Borrow Date:</b> {{ b.borrow_date }} <br>
<b>Due Date:</b> {{ b.due_date }}
</div>
{% endfor %}

</body>
</html>
