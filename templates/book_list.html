<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>

<h2>Book List</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Book Name</th>
        <th>Author</th>
        <th>Available Quantity</th>
        <th>Action</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.author.full_name }}</td>
        <td>{{ book.quantity }}</td>
        <td>
            <a href="/admin/delete-book/{{ book.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/admin/dashboard">Back to Dashboard</a>

</body>
</html>
